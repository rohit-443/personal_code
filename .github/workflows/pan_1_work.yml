name: Scheduled Stock Analysis

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 11 * * 1-5' # Runs Monday to Friday at 11:30 AM UTC (5:00 PM IST)
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run portfolio script
      env:
        GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
        DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        ticker_fomo_news_gemini_api: ${{ secrets.ticker_fomo_news_gemini_api }}
      run: |
        python pan_portfolio_dropbox.py
        python pan_1_portfolio_dropbox.py
        python pan_2_portfolio_dropbox.py
        python ai_recommendation.py
        
    - name: Commit and Push updated historical data
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add all_tickers_3_years_history.csv pan1_2year_history.csv pan2_2year_history.csv category_history.json indicators_history.json backtesting_results.json
        git commit -m "Update historical stock data and AI JSON cache [skip ci]" || echo "No changes to commit"
        git push
