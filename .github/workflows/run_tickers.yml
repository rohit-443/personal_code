name: Ticker Data Sync

on:
  workflow_dispatch: 

jobs:
  update-csv:
    runs-on: ubuntu-latest
    # This acts as your "credential" to write to the repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install yfinance pandas google-genai

      - name: Run Data Collection
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          ticker_fomo_news_gemini_api: ${{ secrets.ticker_fomo_news_gemini_api }}
        run: |
          python process_tickers.py
          python pan_portfolio_dropbox.py
          python pan_1_portfolio_dropbox.py
          python pan_2_portfolio_dropbox.py
          python ai_recommendation.py

      - name: Commit and Push
        run: |
          # These tell GitHub who is making the change
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add all_tickers_3_years_history.csv pan1_2year_history.csv pan2_2year_history.csv category_history.json indicators_history.json backtesting_results.json
          
          # Only commit if the file was actually created/changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update JSON DB [skip ci]" && git push)
